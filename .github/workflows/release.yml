name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: artisan-windows-x64.exe
          - os: macos-latest
            artifact: artisan-macos-arm64
          # Intel macOS (macos-13) 暂时跳过：runner 配额紧张长期 pending
          # Intel Mac 用户可改用 npx @wingeek/artisan 或 bunx @wingeek/artisan
          # - os: macos-13
          #   artifact: artisan-macos-x64
          - os: ubuntu-latest
            artifact: artisan-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - run: bun run build:bin

      # build.ts 输出 release/artisan(.exe)，rename 成 matrix 名字避免跨平台合并时互相覆盖
      - name: Rename binary to matrix artifact name
        shell: bash
        run: mv release/artisan* "release/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
